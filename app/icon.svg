<svg xmlns="http://www.w3.org/2000/svg" viewBox="5 3 54 54" width="64" height="64">
  <title>Syed Kazmi</title>
  <defs>
    <linearGradient id="fur" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2b3447"/>
      <stop offset="1" stop-color="#10151f"/>
    </linearGradient>
    <linearGradient id="rim" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#3ee0ff"/>
      <stop offset="1" stop-color="#ad93ff"/>
    </linearGradient>
    <linearGradient id="ear" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3ee0ff"/>
      <stop offset="1" stop-color="#ad93ff"/>
    </linearGradient>
    <radialGradient id="eye" cx="0.5" cy="0.4" r="0.7">
      <stop offset="0" stop-color="#e6fcff"/>
      <stop offset="0.5" stop-color="#3ee0ff"/>
      <stop offset="1" stop-color="#1aa6d8"/>
    </radialGradient>
    <filter id="soft" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="1.3"/>
    </filter>
  </defs>

  <!-- ears -->
  <path d="M48 25 L51 8 L35 18 Z" fill="url(#fur)" stroke="url(#rim)" stroke-width="1.1" stroke-linejoin="round"/>
  <path d="M46 22 L48 12 L39 18 Z" fill="url(#ear)" fill-opacity="0.55"/>
  <path d="M16 25 L13 8 L29 18 Z" fill="url(#fur)" stroke="url(#rim)" stroke-width="1.1" stroke-linejoin="round"/>
  <path d="M18 22 L16 12 L25 18 Z" fill="url(#ear)" fill-opacity="0.55"/>
  <circle cx="13" cy="8" r="1.8" fill="#3ee0ff"/>

  <!-- head -->
  <path d="M16 31 C16 22 22 17 32 17 C42 17 48 22 48 31 C48 35 48 39 45.5 43 C42.5 50 38 53.5 32 53.5 C26 53.5 21.5 50 18.5 43 C16 39 16 35 16 31 Z" fill="url(#fur)" stroke="url(#rim)" stroke-width="1.3"/>

  <!-- eyes: blurred glow + sharp core -->
  <g filter="url(#soft)">
    <path d="M21 35.2 C22.6 31.4 27 31.2 30.2 33.2 C28.2 36.2 23.2 36.6 21 35.2 Z" fill="#3ee0ff"/>
    <path d="M43 35.2 C41.4 31.4 37 31.2 33.8 33.2 C35.8 36.2 40.8 36.6 43 35.2 Z" fill="#3ee0ff"/>
  </g>
  <path d="M21 35.2 C22.6 31.4 27 31.2 30.2 33.2 C28.2 36.2 23.2 36.6 21 35.2 Z" fill="url(#eye)"/>
  <path d="M43 35.2 C41.4 31.4 37 31.2 33.8 33.2 C35.8 36.2 40.8 36.6 43 35.2 Z" fill="url(#eye)"/>
  <ellipse cx="25.7" cy="33.8" rx="0.9" ry="2.2" fill="#06121a"/>
  <ellipse cx="38.3" cy="33.8" rx="0.9" ry="2.2" fill="#06121a"/>
  <circle cx="24.3" cy="32.7" r="0.75" fill="#ffffff"/>
  <circle cx="36.9" cy="32.7" r="0.75" fill="#ffffff"/>

  <!-- nose -->
  <path d="M32 41.8 L30.2 39.8 Q32 38.9 33.8 39.8 Z" fill="#ad93ff"/>
</svg>
