<svg xmlns="http://www.w3.org/2000/svg" viewBox="5 3 54 54" width="64" height="64">
  <title>Syed Kazmi</title>
  <defs>
    <linearGradient id="fur" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#313c52"/>
      <stop offset="1" stop-color="#10151f"/>
    </linearGradient>
    <linearGradient id="rim" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#3ee0ff"/>
      <stop offset="1" stop-color="#ad93ff"/>
    </linearGradient>
    <linearGradient id="inner" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffd2e7"/>
      <stop offset="1" stop-color="#ff8fc4"/>
    </linearGradient>
    <radialGradient id="eye" cx="0.5" cy="0.38" r="0.72">
      <stop offset="0" stop-color="#e6fff2"/>
      <stop offset="0.45" stop-color="#4ef0a6"/>
      <stop offset="1" stop-color="#16a86b"/>
    </radialGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#3ee0ff" stop-opacity="0.55"/>
      <stop offset="0.55" stop-color="#45e6a6" stop-opacity="0.2"/>
      <stop offset="1" stop-color="#7c5cff" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="1"/>
    </filter>
  </defs>

  <!-- glow behind head -->
  <ellipse cx="32" cy="36" rx="19" ry="16" fill="url(#glow)"/>

  <!-- ears -->
  <path d="M44.5 21.5 Q49 12 48.5 9 Q41.5 11 35 18.5 Z" fill="url(#fur)" stroke="url(#rim)" stroke-width="1.2" stroke-linejoin="round"/>
  <path d="M43.5 20.4 Q46.4 14.2 46.2 11.4 Q41.8 13 37.4 18 Z" fill="url(#inner)" fill-opacity="0.7"/>
  <path d="M19.5 21.5 Q15 12 15.5 9 Q22.5 11 29 18.5 Z" fill="url(#fur)" stroke="url(#rim)" stroke-width="1.2" stroke-linejoin="round"/>
  <path d="M20.5 20.4 Q17.6 14.2 17.8 11.4 Q22.2 13 26.6 18 Z" fill="url(#inner)" fill-opacity="0.7"/>

  <!-- round, chubby head -->
  <path d="M32 17.5 C40.5 17.5 48.5 22.5 48.5 32 C48.5 38 46.5 44 41.5 48 C38.5 50.5 35.5 51.5 32 51.5 C28.5 51.5 25.5 50.5 22.5 48 C17.5 44 15.5 38 15.5 32 C15.5 22.5 23.5 17.5 32 17.5 Z" fill="url(#fur)" stroke="url(#rim)" stroke-width="1.3"/>

  <!-- blush cheeks -->
  <ellipse cx="21.8" cy="41.5" rx="2.9" ry="1.7" fill="#ff8fc4" opacity="0.32"/>
  <ellipse cx="42.2" cy="41.5" rx="2.9" ry="1.7" fill="#ff8fc4" opacity="0.32"/>

  <!-- eyes: big round sparkly green -->
  <g filter="url(#soft)" fill="#45e6a6">
    <circle cx="25.3" cy="36" r="4.7"/>
    <circle cx="38.7" cy="36" r="4.7"/>
  </g>
  <circle cx="25.3" cy="36" r="4.3" fill="url(#eye)"/>
  <circle cx="38.7" cy="36" r="4.3" fill="url(#eye)"/>
  <circle cx="25.3" cy="36.3" r="2.6" fill="#07140e"/>
  <circle cx="38.7" cy="36.3" r="2.6" fill="#07140e"/>
  <circle cx="23.9" cy="34.5" r="1.2" fill="#ffffff"/>
  <circle cx="37.3" cy="34.5" r="1.2" fill="#ffffff"/>
  <circle cx="26.7" cy="37.4" r="0.6" fill="#ffffff" fill-opacity="0.9"/>
  <circle cx="40.1" cy="37.4" r="0.6" fill="#ffffff" fill-opacity="0.9"/>

  <!-- nose + :3 mouth -->
  <path d="M30.2 41.4 Q32 40.7 33.8 41.4 Q32.7 43.2 32 43.6 Q31.3 43.2 30.2 41.4 Z" fill="#ff8fc4"/>
  <path d="M32 43.6 V44.2 M32 44.2 Q30.4 45.8 28.9 44.8 M32 44.2 Q33.6 45.8 35.1 44.8" fill="none" stroke="#ffffff" stroke-opacity="0.32" stroke-width="0.9" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
